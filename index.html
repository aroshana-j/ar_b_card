<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Happy Birthday Modayoooo!!!</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <style>
      .a-enter-vr {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./assets/card.mind;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="cardModel" src="./assets/animated_card.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">        
        <a-gltf-model src="#cardModel"
                      scale="0.5 0.5 0.5" 
                      position="0 0 0.1"
                      animation__spin="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"
                      animation__float="property: position; to: 0 0.3 0.1; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine"
                      animation-mixer>
        </a-gltf-model>
      </a-entity>
      
    </a-scene>
  </body>

</html>
